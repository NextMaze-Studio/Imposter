<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend's GYM | Interactive Trainer</title>
    <style>
        /* Modern Gym Dark Theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #111 60%, #ff3e3e 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #ff3e3e;
        }

        header h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        header h1 span {
            color: #ff3e3e;
        }

        header p {
            color: #aaa;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Interactive SVG Styling */
        .interactive-map-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        svg {
            width: 100%;
            max-width: 320px;
            height: auto;
        }

        /* This styles the clickable muscle zones */
        .muscle-zone {
            fill: #444;
            stroke: #222;
            stroke-width: 2;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .muscle-zone:hover {
            fill: #ff3e3e;
            filter: drop-shadow(0px 0px 8px #ff3e3e);
        }

        .muscle-zone.active {
            fill: #ff3e3e;
            stroke: #fff;
        }

        /* Dynamic Information Panel */
        .info-panel {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            border-left: 5px solid #ff3e3e;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-panel h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: #ff3e3e;
        }

        .info-panel h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #ddd;
        }

        .info-panel p {
            color: #bbb;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .exercise-list {
            list-style: none;
        }

        .exercise-list li {
            background: #262626;
            margin: 8px 0;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .exercise-list li::before {
            content: "⚡";
            margin-right: 10px;
            color: #ff3e3e;
        }
    </style>
</head>
<body>

    <header>
        <h1>Legend's <span>GYM</span></h1>
        <p>Tap any muscle on the interactive trainer to discover its name and target exercises!</p>
    </header>

    <div class="container">
        <!-- LEFT: The Interactive Body Vector Map -->
        <div class="interactive-map-box">
            <svg viewBox="0 0 200 420" xmlns="http://www.w3.org/2000/svg">
                <!-- Head / Neck -->
                <circle cx="100" cy="45" r="20" fill="#333" stroke="#222" stroke-width="2"/>
                <rect x="94" y="65" width="12" height="15" fill="#333" />
                
                <!-- Shoulders (Deltoids) -->
                <path class="muscle-zone" data-muscle="shoulders" d="M 65,78 C 55,85 52,105 58,115 Z" />
                <path class="muscle-zone" data-muscle="shoulders" d="M 135,78 C 145,85 148,105 142,115 Z" />
                
                <!-- Chest (Pectorals) -->
                <path class="muscle-zone" data-muscle="chest" d="M 68,82 L 100,85 L 100,120 L 70,118 Z" />
                <path class="muscle-zone" data-muscle="chest" d="M 132,82 L 100,85 L 100,120 L 130,118 Z" />
                
                <!-- Arms (Biceps) -->
                <path class="muscle-zone" data-muscle="biceps" d="M 56,117 C 54,125 50,145 54,155 L 64,155 C 66,145 64,125 64,117 Z" />
                <path class="muscle-zone" data-muscle="biceps" d="M 144,117 C 146,125 150,145 146,155 L 136,155 C 134,145 136,125 136,117 Z" />
                
                <!-- Abs (Abdominals) -->
                <rect class="muscle-zone" data-muscle="abs" x="76" y="125" width="48" height="55" rx="5" />
                
                <!-- Thighs (Quadriceps) -->
                <path class="muscle-zone" data-muscle="quads" d="M 68,195 L 98,198 L 95,290 L 68,280 Z" />
                <path class="muscle-zone" data-muscle="quads" d="M 132,195 L 102,198 L 105,290 L 132,280 Z" />
            </svg>
        </div>

        <!-- RIGHT: Dynamic Content Display Panel -->
        <div class="info-panel" id="infoPanel">
            <h2>Select a Muscle</h2>
            <p>Click on any highlighted muscle zone on the body map to view targeted training paths and expert workouts.</p>
        </div>
    </div>

    <script>
        // Database of muscle info matching the "data-muscle" attribute tags in the SVG map
        const muscleDatabase = {
            chest: {
                title: "Pectoralis Major (Chest)",
                desc: "The primary muscle group used for pushing movements. Developing your chest creates upper-body power and solid structural symmetry.",
                exercises: ["Barbell Bench Press", "Incline Dumbbell Flyes", "Cable Crossovers", "Push-Ups"]
            },
            shoulders: {
                title: "Deltoids (Shoulders)",
                desc: "Your deltoids control all overhead lifting and arm rotation. Broad shoulders are essential for that classic 'V-taper' athletic build.",
                exercises: ["Overhead Military Press", "Dumbbell Lateral Raises", "Arnold Press", "Face Pulls"]
            },
            biceps: {
                title: "Biceps Brachii (Arms)",
                desc: "The muscle responsible for elbow flexion and pulling weights toward your body. A staple target for building arm size.",
                exercises: ["Barbell Biceps Curls", "Hammer Curls", "Incline Dumbbell Curls", "Preacher Curls"]
            },
            abs: {
                title: "Abdominals (Core)",
                desc: "Your core stabilizes your entire spine, transfers power between your lower and upper body, and keeps your balance locked down.",
                exercises: ["Hanging Knee Raises", "Ab Wheel Rollouts", "Planks", "Cable Crunches"]
            },
            quads: {
                title: "Quadriceps (Thighs)",
                desc: "The massive four-muscle group on the front of your thighs. They drive squatting power, leaping ability, and structural leg density.",
                exercises: ["Barbell Back Squats", "Leg Press", "Bulgarian Split Squats", "Leg Extensions"]
            }
        };

        const zones = document.querySelectorAll('.muscle-zone');
        const infoPanel = document.getElementById('infoPanel');

        zones.forEach(zone => {
            zone.addEventListener('click', () => {
                // Clear active styling from previous selections
                zones.forEach(z => z.classList.remove('active'));
                
                // Set current muscle selection to active
                zone.classList.add('active');
                
                const muscleKey = zone.getAttribute('data-muscle');
                const data = muscleDatabase[muscleKey];
                
                if (data) {
                    // Inject database content cleanly into our information panel layout
                    let exercisesHTML = '<ul class="exercise-list">';
                    data.exercises.forEach(ex => {
                        exercisesHTML += `<li>${ex}</li>`;
                    });
                    exercisesHTML += '</ul>';

                    infoPanel.innerHTML = `
                        <h2>${data.title}</h2>
                        <p>${data.desc}</p>
                        <h3>Top Legend's Workouts:</h3>
                        ${exercisesHTML}
                    `;
                }
            });
        });
    </script>
</body>
</html>
