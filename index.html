<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend's Gym - Sculpt Your Body</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- THEME VARIABLES (Electric Blue Replace Green) --- */
        :root {
            --primary-blue: #00d2ff;
            --dark-blue: #0072ff;
            --bg-dark: #0b0c10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(0, 210, 255, 0.2);
        }

        /* --- HEADER NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 8%;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: var(--primary-blue);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav ul li a {
            color: #aaaaaa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav ul li a:hover, nav ul li a.active {
            color: #ffffff;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-contact {
            background-color: var(--primary-blue);
            color: #000000;
            padding: 10px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .btn-contact:hover {
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        .btn-started {
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-started:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 8% 40px 8%;
            background: radial-gradient(circle at center, rgba(0, 114, 255, 0.15) 0%, rgba(11, 12, 16, 1) 70%);
        }

        /* Sidebar Navigation Indicators (PREV / NEXT) */
        .side-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: #444;
            font-weight: 600;
            letter-spacing: 4px;
            font-size: 14px;
            user-select: none;
        }
        .side-nav.prev { left: 4%; }
        .side-nav.next { right: 4%; }
        .side-nav span {
            display: block;
            margin-bottom: 15px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            cursor: pointer;
            transition: 0.3s;
        }
        .side-nav span:hover {
            color: var(--primary-blue);
        }

        /* Central Content Area */
        .hero-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 700px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* Headline */
        .hero-title {
            text-align: center;
            font-size: 64px;
            font-weight: 800;
            line-height: 1.1;
            z-index: 10;
            margin-top: 40px;
            letter-spacing: -1px;
        }

        .hero-title span {
            color: var(--primary-blue);
            position: relative;
        }

        /* Background Athlete Image Styling (Matching image_8205a5.jpg layout) */
        .hero-center-img {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 85%;
            z-index: 2;
            opacity: 0.75;
            pointer-events: none;
            filter: grayscale(100%) contrast(110%);
        }

        /* Floating Stat Cards */
        .stat-card {
            position: absolute;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            padding: 15px 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            min-width: 110px;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-blue);
        }

        .stat-card i {
            color: var(--primary-blue);
            font-size: 22px;
            margin-bottom: 2px;
        }

        .stat-card .label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 18px;
            font-weight: 700;
        }

        /* Positioning floating cards mirroring image_8205a5.jpg */
        .card-top-left     { top: 35%; left: 22%; }
        .card-top-right    { top: 35%; right: 22%; }
        .card-bottom-left  { bottom: 20%; left: 20%; }
        .card-bottom-right { bottom: 20%; right: 20%; }

        /* --- HERO FOOTER ELEMENTS --- */
        .hero-footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            padding: 0 20px;
        }

        /* Social Proof Group */
        .social-proof {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatars {
            display: flex;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #0b0c10;
            margin-right: -12px;
            background-color: #333;
            background-size: cover;
            background-position: center;
        }

        .proof-text {
            display: flex;
            flex-direction: column;
        }

        .proof-text .count {
            font-size: 22px;
            font-weight: 800;
        }

        .proof-text .sub {
            font-size: 12px;
            color: #888;
        }

        /* Call To Action Button Bottom Right */
        .cta-action-btn {
            background-color: var(--primary-blue);
            color: #000000;
            padding: 16px 36px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 25px rgba(0, 210, 255, 0.4);
            transition: all 0.3s ease;
        }

        .cta-action-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 5px 30px rgba(255, 255, 255, 0.5);
            transform: scale(1.03);
        }

        /* Responsive Optimization */
        @media (max-width: 1024px) {
            .hero-title { font-size: 48px; }
            .card-top-left { left: 10%; }
            .card-top-right { right: 10%; }
            .card-bottom-left { left: 8%; }
            .card-bottom-right { right: 8%; }
        }

        @media (max-width: 768px) {
            header { padding: 20px 4%; }
            nav, .nav-buttons { display: none; } /* Simplified for mobile preview */
            .side-nav { display: none; }
            .hero-title { font-size: 36px; margin-top: 80px; }
            .hero-center-img { height: 60%; }
            .stat-card { position: static; }
            .mobile-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin-top: 20px;
                z-index: 10;
            }
            .hero-container { height: auto; gap: 30px; }
            .hero-footer { flex-direction: column; gap: 20px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- HEADER NAVIGATION -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-dumbbell" style="color: var(--primary-blue);"></i>
            LEGEND'S<span>GYM</span>
        </div>
        <nav>
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">Exercise</a></li>
            </ul>
        </nav>
        <div class="nav-buttons">
            <a href="#" class="btn-contact">Contact Us</a>
            <a href="#" class="btn-started">Get Started</a>
        </div>
    </header>

    <!-- MAIN HERO SECTION -->
    <section class="hero">
        
        <!-- Structural Sidebar Indicators from image_8205a5.jpg -->
        <div class="side-nav prev">
            <span>P</span><span>R</span><span>E</span><span>V</span>
        </div>
        <div class="side-nav next">
            <span>N</span><span>E</span><span>X</span><span>T</span>
        </div>

        <div class="hero-container">
            <!-- Headline -->
            <h1 class="hero-title">
                Sculpt <span>Your</span> Body,<br>Elevate Your Spirit
            </h1>

            <!-- Centerpiece Athlete Graphic Placeholder -->
            <!-- Note: Replace the placeholder source below with your actual image file "image_8205a5.jpg" when deploying -->
            <img class="hero-center-img" src="https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?q=80&w=1000&auto=format&fit=crop" alt="Athlete Visual Asset from image_8205a5.jpg">

            <!-- Floating Metrics / Stats Panels -->
            <div class="mobile-grid">
                <div class="stat-card card-top-left">
                    <i class="fa-regular fa-clock"></i>
                    <span class="label">Hours</span>
                    <span class="value">1.5</span>
                </div>

                <div class="stat-card card-top-right">
                    <i class="fa-solid fa-person-running"></i>
                    <span class="label">Poses</span>
                    <span class="value">20</span>
                </div>

                <div class="stat-card card-bottom-left">
                    <i class="fa-solid fa-fire-flame-simple"></i>
                    <span class="label">Kcal</span>
                    <span class="value">550</span>
                </div>

                <div class="stat-card card-bottom-right">
                    <i class="fa-solid fa-dumbbell"></i>
                    <span class="label">Sets</span>
                    <span class="value">5</span>
                </div>
            </div>

            <!-- Hero Footer -->
            <div class="hero-footer">
                <!-- Social Proof Panel -->
                <div class="social-proof">
                    <div class="user-avatars">
                        <div class="avatar" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop&q=60');"></div>
                        <div class="avatar" style="background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&auto=format&fit=crop&q=60');"></div>
                        <div class="avatar" style="background-image: url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&auto=format&fit=crop&q=60');"></div>
                    </div>
                    <div class="proof-text">
                        <span class="count">12k+</span>
                        <span class="sub">Happy Spirits</span>
                    </div>
                </div>

                <!-- Primary Action Trigger -->
                <a href="#" class="cta-action-btn">
                    Let's Start <i class="fa-solid fa-chevron-right"></i><i class="fa-solid fa-chevron-right" style="opacity:0.6"></i><i class="fa-solid fa-chevron-right" style="opacity:0.3"></i>
                </a>
            </div>

        </div>
    </section>

</body>
</html>
