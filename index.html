<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Textbook Assistant</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding: 20px; }
        .chat-container { width: 450px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 600px; }
        .chat-header { background: #1a73e8; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .chat-header select { padding: 5px; border-radius: 4px; border: none; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 15px; max-width: 80%; word-break: break-word; white-space: pre-wrap; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #f1f3f4; color: #202124; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 10px; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; align-items: center; background: #fafafa; }
        .preview-img { max-width: 150px; border-radius: 8px; margin-top: 5px; display: block; }
    </style>
    
    <!-- 1. Load the official Google Gemini SDK directly in the browser -->
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run"
        }
      }
    </script>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <strong>Textbook Solver (Guest)</strong>
        <select id="modelSelect">
            <option value="gemini-2.5-flash">Gemini 2.5 Flash (Fast)</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro (Deep Logic)</option>
        </select>
    </div>

    <div id="chatMessages" class="chat-messages">
        <div class="message ai">Hello! Upload a photo of your textbook page. I will analyze it and provide a step-by-step educational breakdown.</div>
    </div>

    <div class="chat-input-area">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('imageInput').click()" style="padding: 10px; background: #34a853; color: white; border: none; border-radius: 6px; cursor: pointer;">
            📷 Upload Photo
        </button>
        <span id="fileName" style="font-size: 12px; color: #666; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">No file chosen</span>
        <button id="sendBtn" onclick="processAndSend()" style="padding: 10px 15px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; margin-left: auto;" disabled>
            Send
        </button>
    </div>
</div>

<script type="module">
    // Import the Google Gen AI library loaded from ESM
    import { GoogleGenAI } from '@google/genai';

    // ⚠️ WARNING: If you are hosting on a public GitHub repo, anyone can see this key.
    // Go to Google AI Studio, get a free key, and paste it here to test it out.
    const GEMINI_API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE"; 

    // 🔒 Your hidden preset prompt injected automatically
    const TEXTBOOK_SYSTEM_PROMPT = 
      "You are an expert academic tutor. Analyze the attached textbook image. " +
      "Extract the questions, charts, or text shown in the photo. Provide a clear, " +
      "step-by-step educational explanation or answer to the material found in the image. " +
      "Keep your language accessible and easy to understand.";

    const imageInput = document.getElementById('imageInput');
    const fileName = document.getElementById('fileName');
    const sendBtn = document.getElementById('sendBtn');
    const chatMessages = document.getElementById('chatMessages');
    const modelSelect = document.getElementById('modelSelect');

    let uploadedBase64 = "";
    let uploadedMimeType = "";

    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        fileName.textContent = file.name;
        sendBtn.disabled = false;

        const reader = new FileReader();
        reader.onload = function(event) {
            // Keep only the base64 string portion, removing the metadata prefix
            uploadedBase64 = event.target.result.split(',')[1];
            uploadedMimeType = file.type;
        };
        reader.readAsDataURL(file);
    });

    // Make the function accessible to the global HTML button
    window.processAndSend = async function() {
        if (!uploadedBase64) return;
        if (GEMINI_API_KEY === "PASTE_YOUR_GEMINI_API_KEY_HERE") {
            alert("Please paste your Gemini API Key inside the script tag first!");
            return;
        }

        sendBtn.disabled = true;
        const selectedModel = modelSelect.value;

        // Display user's image in the chat
        const userBubble = document.createElement('div');
        userBubble.className = 'message user';
        userBubble.innerHTML = `Sent textbook photo:<br><img class="preview-img" src="data:${uploadedMimeType};base64,${uploadedBase64}">`;
        chatMessages.appendChild(userBubble);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Display loading bubble
        const loadingBubble = document.createElement('div');
        loadingBubble.className = 'message ai';
        loadingBubble.textContent = "AI is evaluating your textbook page... please wait...";
        chatMessages.appendChild(loadingBubble);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        // Reset the interface fields
        fileName.textContent = "No file chosen";
        imageInput.value = "";

        try {
            // Initialize Gemini directly inside the client browser
            const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });

            // Structure the image data payload
            const imagePart = {
                inlineData: {
                    data: uploadedBase64,
                    mimeType: uploadedMimeType
                },
            };

            // Call the official Gemini servers directly from the browser
            const response = await ai.models.generateContent({
                model: selectedModel,
                contents: [
                    TEXTBOOK_SYSTEM_PROMPT,
                    imagePart
                ],
            });

            // Set the final response text
            loadingBubble.textContent = response.text;

        } catch (error) {
            loadingBubble.textContent = "Error processing image. Check your API key or console log.";
            console.error("Gemini Browser Error:", error);
        }

        sendBtn.disabled = false;
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>
</body>
</html>
