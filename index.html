<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend's Gym | Sculpt Your Body, Elevate Your Spirit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- THEME VARIABLES (Electric Cyan/Blue Shift) --- */
        :root {
            --primary-blue: #c2f900; /* Replaced with crisp neon cyan-blue below */
            --neon-blue: #00f0ff;
            --dark-blue: #0072ff;
            --bg-dark: #07080a;
            --card-glass: rgba(20, 24, 33, 0.65);
            --card-border: rgba(0, 240, 255, 0.25);
            --text-glow: rgba(0, 240, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 6%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(7,8,10,0.8), rgba(7,8,10,0));
            backdrop-filter: blur(4px);
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
        }

        .logo span { color: var(--neon-blue); }
        .logo i { color: var(--neon-blue); font-size: 20px; }

        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        nav ul li a {
            color: #8a92a6;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        nav ul li a:hover, nav ul li a.active {
            color: #ffffff;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-contact {
            background-color: var(--neon-blue);
            color: #000000;
            padding: 10px 22px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            transition: 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .btn-contact:hover {
            background-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        .btn-started {
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            transition: 0.3s;
        }

        .btn-started:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
        }

        /* --- HERO CANVAS VIEW --- */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 114, 255, 0.1) 0%, rgba(7, 8, 10, 1) 80%);
            overflow: hidden;
        }

        /* Vertical Trim Indicators */
        .side-tag {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 18px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 15px;
            user-select: none;
            z-index: 10;
        }
        .side-tag.prev { left: 4%; }
        .side-tag.next { right: 4%; }
        .side-tag span { writing-mode: vertical-rl; text-orientation: upright; }

        .hero-viewport {
            position: relative;
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            margin-top: 80px;
        }

        /* Exact Typography Styling Layout */
        .hero-headline {
            text-align: center;
            font-size: 72px;
            font-weight: 800;
            line-height: 1.05;
            z-index: 10;
            margin-top: 15px;
            letter-spacing: -0.5px;
            color: #f4f6fa;
        }

        .hero-headline span {
            color: #e2e8f0;
        }
        .hero-headline .accent-word {
            color: #d1f73c; /* Keeps slight contrast blend like image */
            color: rgba(255,255,255,0.9);
            text-shadow: 0 0 1px rgba(0,0,0,0.5);
        }
        
        /* High-contrast Central Athlete Image Layer */
        .athlete-backdrop {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            height: 90%;
            z-index: 2;
            opacity: 0.78;
            pointer-events: none;
            /* Replicates ultra-sharp dramatic lighting profile */
            filter: grayscale(100%) contrast(125%) brightness(95%);
        }

        /* Exact Angled Glassmorphic Stat Pill Cards from image */
        .angled-card {
            position: absolute;
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 115px;
            height: 115px;
            z-index: 5;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Exact card tilts matches source mockup template precisely */
        .card-1 { top: 32%; left: 23%; transform: rotate(-8deg); }
        .card-2 { top: 32%; right: 23%; transform: rotate(8deg); }
        .card-3 { bottom: 24%; left: 21%; transform: rotate(-6deg); }
        .card-4 { bottom: 24%; right: 21%; transform: rotate(6deg); }

        .angled-card:hover {
            transform: scale(1.08) rotate(0deg);
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
        }

        .angled-card i {
            color: var(--neon-blue);
            font-size: 24px;
            margin-bottom: 6px;
            filter: drop-shadow(0 0 8px var(--text-glow));
        }

        .angled-card .metric-label {
            font-size: 12px;
            color: #a0aec0;
            font-weight: 500;
        }

        .angled-card .metric-value {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            margin-top: 1px;
        }

        /* --- LOWER LAYER ACTIONS --- */
        .hero-base-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            padding: 0 15px 25px 15px;
        }

        /* Left Side Profile Proof Grouping */
        .social-proof-group {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-stack {
            display: flex;
        }

        .avatar-node {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--bg-dark);
            margin-right: -10px;
            background-size: cover;
            background-position: center;
            background-color: #1a202c;
        }

        .proof-caption {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .proof-caption .headline-count {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
        }

        .proof-caption .sub-label {
            font-size: 12px;
            color: #718096;
            font-weight: 500;
        }

        /* Right Side Highlight Let's Start Action Button */
        .action-pulse-btn {
            background-color: var(--neon-blue);
            color: #000000;
            padding: 16px 32px;
            border-radius: 28px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.35);
            transition: all 0.3s ease;
        }

        .action-pulse-btn:hover {
            background-color: #ffffff;
            box-shadow: 0 4px 25px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .action-pulse-btn i {
            font-size: 11px;
            transition: 0.2s;
        }
        
        .action-pulse-btn:hover i {
            transform: translateX(3px);
        }

        /* --- RESPONSIVE SCALING HANDLERS --- */
        @media (max-width: 1150px) {
            .hero-headline { font-size: 54px; }
            .card-1 { left: 14%; } .card-2 { right: 14%; }
            .card-3 { left: 12%; } .card-4 { right: 12%; }
        }

        @media (max-width: 850px) {
            header { padding: 20px 4%; }
            nav, .nav-buttons, .side-tag { display: none; }
            .hero-headline { font-size: 40px; margin-top: 40px; }
            .athlete-backdrop { height: 65%; bottom: 60px; }
            
            /* Snap floating cards into grid for clear view on mobile devices */
            .mobile-snapped-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
                margin-top: 40px;
                z-index: 10;
                width: 100%;
                padding: 0 10px;
            }
            .angled-card {
                position: static !important;
                transform: none !important;
                height: 100px;
                width: 100%;
            }
            .hero-base-row { flex-direction: column; gap: 25px; text-align: center; }
            .social-proof-group { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <i class="fa-solid fa-bolt"></i> LEGEND'S<span>GYM</span>
        </a>
        <nav>
            <ul>
                <li><a href="#" class="active">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">Exercise</a></li>
            </ul>
        </nav>
        <div class="nav-buttons">
            <a href="#" class="btn-contact">Contact Us</a>
            <a href="#" class="btn-started">Get Started</a>
        </div>
    </header>

    <section class="hero">
        <div class="side-tag prev"><span>P</span><span>R</span><span>E</span><span>V</span></div>
        <div class="side-tag next"><span>N</span><span>E</span><span>X</span><span>T</span></div>

        <div class="hero-viewport">
            <h1 class="hero-headline">
                Sculpt <span class="accent-word">Your</span> Body,<br><span>Elevate Your Spirit</span>
            </h1>

            <img class="athlete-backdrop" src="https://images.unsplash.com/photo-1574680096145-d05b474e2155?q=80&w=1200&auto=format&fit=crop" alt="High contrast athlete graphic element mapping layout composition">

            <div class="mobile-snapped-grid">
                <div class="angled-card card-1">
                    <i class="fa-regular fa-clock"></i>
                    <span class="metric-label">Hours</span>
                    <span class="metric-value">1.5</span>
                </div>

                <div class="angled-card card-2">
                    <i class="fa-solid fa-person-running"></i>
                    <span class="metric-label">Poses</span>
                    <span class="metric-value">20</span>
                </div>

                <div class="angled-card card-3">
                    <i class="fa-solid fa-fire-flame-simple"></i>
                    <span class="metric-label">Kcal</span>
                    <span class="metric-value">550</span>
                </div>

                <div class="angled-card card-4">
                    <i class="fa-solid fa-dumbbell"></i>
                    <span class="metric-label">Sets</span>
                    <span class="metric-value">5</span>
                </div>
            </div>

            <div class="hero-base-row">
                <div class="social-proof-group">
                    <div class="avatar-stack">
                        <div class="avatar-node" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&auto=format&fit=crop&q=60');"></div>
                        <div class="avatar-node" style="background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&auto=format&fit=crop&q=60');"></div>
                        <div class="avatar-node" style="background-image: url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=80&auto=format&fit=crop&q=60');"></div>
                    </div>
                    <div class="proof-caption">
                        <span class="headline-count">12k+</span>
                        <span class="sub-label">Happy Spirits</span>
                    </div>
                </div>

                <a href="#" class="action-pulse-btn">
                    Let's Start 
                    <span style="display: flex; align-items:center; margin-left:4px;">
                        <i class="fa-solid fa-chevron-right"></i>
                        <i class="fa-solid fa-chevron-right" style="opacity: 0.5;"></i>
                        <i class="fa-solid fa-chevron-right" style="opacity: 0.2;"></i>
                    </span>
                </a>
            </div>
        </div>
    </section>

</body>
</html>
